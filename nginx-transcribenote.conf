# Nginx config for TranscribeNote (transcribe.scrollverse.site + api.transcribe.scrollverse.site)
# Place in: /etc/nginx/sites-available/transcribenote
# Then: sudo ln -s /etc/nginx/sites-available/transcribenote /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# Frontend: transcribe.scrollverse.site -> localhost:9000
server {
    listen 80;
    listen [::]:80;
    server_name transcribe.scrollverse.site;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API + WebSocket: api.transcribe.scrollverse.site -> localhost:9001
server {
    listen 80;
    listen [::]:80;
    server_name api.transcribe.scrollverse.site;

    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

